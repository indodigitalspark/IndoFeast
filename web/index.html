<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="IndoFeast is a production-ready food ordering, vendor operations, delivery, and admin platform built for responsive web experiences.">
  <meta name="robots" content="index,follow">
  <meta name="author" content="IndoFeast">
  <meta name="keywords" content="IndoFeast, food delivery, restaurant ordering, vendor dashboard, delivery partner, admin dashboard">
  <meta name="theme-color" content="#FF6B00">
  <meta property="og:title" content="IndoFeast">
  <meta property="og:description" content="Responsive food commerce platform for customers, vendors, delivery partners, and admins.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="indofeast_logo_orange.svg">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="IndoFeast">
  <meta property="twitter:description" content="Responsive food commerce platform for customers, vendors, delivery partners, and admins.">
  <link rel="canonical" href="https://indofeast.com/">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="IndoFeast">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="shortcut icon" href="favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="indofeast_logo_orange.svg"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <title>IndoFeast</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <noscript>IndoFeast requires JavaScript to run this application.</noscript>
  <div id="recaptcha-container"></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "IndoFeast",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "IndoFeast is a food commerce platform for customers, vendors, delivery partners, and admins."
    }
  </script>
</body>
</html>
